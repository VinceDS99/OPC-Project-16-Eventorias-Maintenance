name: CD — Livraison Continue

# Déclenchement : création d'un tag Git (ex: v1.0.0)
on:
  push:
    tags:
      - 'v*'

jobs:
  cd:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Create local.properties
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > local.properties

      # Recrée le keystore depuis le secret base64
      - name: Decode keystore
        run: |
          echo '${{ secrets.KEYSTORE_FILE }}' | base64 --decode > app/eventorias.jks

      # Recrée keystore.properties pour que le build.gradle le lise
      - name: Create keystore.properties
        run: |
          echo "storeFile=app/eventorias.jks" >> keystore.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> keystore.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> keystore.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> keystore.properties

      # Build de l'APK signé en release
      - name: Build release APK
        run: ./gradlew assembleRelease

      # Upload sur Firebase App Distribution
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: testers
          file: app/build/outputs/apk/release/app-release.apk