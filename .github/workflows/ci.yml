name: CI — Intégration Continue

# Déclenchement : toute pull request vers main
on:
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:

      # Checkout complet (fetch-depth 0 requis pour SonarCloud blame)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # JDK 17 avec cache Gradle pour accélérer les builds suivants
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Recrée google-services.json depuis le secret (fichier ignoré par Git)
      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      # Recrée local.properties avec la clé Maps
      - name: Create local.properties
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > local.properties

      # Tests unitaires + rapport JaCoCo (requis pour la couverture Sonar)
      - name: Unit tests + JaCoCo coverage
        run: ./gradlew testDebugUnitTest jacocoTestReport

      # Tests instrumentés sur émulateur Android
      - name: Instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest

      # Analyse SonarCloud (lit SONAR_TOKEN depuis l'env automatiquement)
      - name: SonarCloud analysis
        run: ./gradlew sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=vinceds99 -Dsonar.projectKey=VinceDS99_OPC-Project-16-Eventorias-Maintenance
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Vérifie que le Quality Gate est passé — fait échouer la CI si non
      - name: Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io