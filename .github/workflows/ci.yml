name: CI — Intégration Continue

on:
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Create local.properties
        run: echo "MAPS_API_KEY=${{ secrets.MAPS_API_KEY }}" > local.properties

      - name: Unit tests + JaCoCo coverage
        run: ./gradlew testDebugUnitTest jacocoTestReport

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install emulator dependencies
        run: sudo apt-get install -y libpulse0

      - name: Instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 28
          arch: x86
          target: default
          disable-animations: true
          emulator-options: -no-snapshot-save -noaudio -no-boot-anim -gpu swiftshader_indirect
          script: ./gradlew connectedDebugAndroidTest

      - name: SonarCloud analysis
        run: ./gradlew sonar -Dsonar.host.url=https://sonarcloud.io -Dsonar.organization=vinceds99 -Dsonar.projectKey=VinceDS99_OPC-Project-16-Eventorias-Maintenance
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Quality Gate check
        uses: sonarsource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io